name: AI_brief daily digest

# 스케줄링은 LLM 이 아니라 GitHub Actions cron 이 담당한다. cron 은 UTC.
# 예) 23:00 UTC = 08:00 KST(UTC+9).
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run(전송/배포 안 함, out/ 미리보기만)"
        type: boolean
        default: true

permissions:
  contents: write        # peaceiris 가 gh-pages 브랜치에 push

concurrency:
  group: ai-brief-daily
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # 🔒 방어선: 저장소 파일에 실제 키/토큰이 섞였으면 여기서 실패(배포 차단).
      - name: Secret scan
        run: python scripts/check_no_secrets.py

      - name: Install deps
        run: pip install -r requirements.txt

      # dedup 상태만 캐시(카카오 토큰은 캐시하지 않는다 — 평문 토큰의 CI 캐시 잔존 방지).
      # access token 은 매 실행 KAKAO_REFRESH_TOKEN Secret 으로 재발급한다(get_access_token).
      - name: Restore dedup cache
        uses: actions/cache@v4
        with:
          path: |
            state/seen_text.json
            state/seen_video.json
            state/video_last.json
            state/sent_log.json
          key: ai-brief-dedup-${{ github.run_id }}
          restore-keys: |
            ai-brief-dedup-

      # ── dry-run 경로(수동 실행 + dry_run=true): 발송/배포 없이 out/ 미리보기만 ──
      - name: Dry-run preview
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        env:
          DRY_RUN: "true"
        run: python main.py

      # ── 운영 경로: build(HTML 렌더 + pending 저장) → deploy → notify(발송 + 상태갱신) ──
      # 순서가 핵심: '배포 성공' 후에만 발송/seen 갱신 → 배포 실패 시 항목이 유실되지 않는다.
      - name: Build digest HTML
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        env:
          DRY_RUN: "false"
        run: python main.py --stage build

      # public/ 를 gh-pages 브랜치로 배포. ⚠️ keep_files:true 필수 — false 로 바꾸면 과거 archive 전량 소실.
      - name: Deploy to GitHub Pages
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) && hashFiles('public/**') != '' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true

      - name: Notify (send Kakao link, mark seen)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        env:
          DRY_RUN: "false"
        run: python main.py --stage notify

      - name: Upload preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-preview
          path: out/
          if-no-files-found: ignore
